name: generate pacman game

on:
  schedule:
    - cron: "0 */6 * * *"   # giảm tần suất để tránh quá tải
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10   # tăng timeout

    steps:
      # 🔥 Tăng RAM cho Node (QUAN TRỌNG NHẤT)
      - name: Increase Node memory
        run: echo "NODE_OPTIONS=--max-old-space-size=8192" >> $GITHUB_ENV

      # 🟢 Generate pacman graph
      - name: generate pacman-contribution-graph.svg
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          include_all_branches: false
          theme: github

      # 🚀 Push sang branch output
      - name: push pacman-contribution-graph.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
